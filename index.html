<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pratham AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;}
body{background:#f8f6f2;color:#191919;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;display:flex;}
:root{
  --bg-main:#fbfaf7;--bg-sidebar:#f3f0e8;--bg-panel:#ffffff;
  --border-color:#e2e0d8;--text-main:#191919;--text-secondary:#4a4a4a;
  --text-dim:#85837d;--accent:#cc6239;--bubble-user:#f3f0e8;
  --overlay:rgba(25,25,25,0.15);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100dvh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#dedbd3;border-radius:3px;}
 
/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;padding:16px 12px;z-index:40;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.brand-header{display:flex;align-items:center;gap:10px;font-family:'Source Serif 4',serif;font-size:20px;font-weight:600;margin-bottom:20px;padding:4px 8px;}
.brand-logo-img{width:28px;height:28px;object-fit:contain;border-radius:6px;}
.new-chat-btn{display:flex;align-items:center;justify-content:space-between;background:transparent;border:1px solid var(--border-color);color:var(--text-main);padding:10px 16px;border-radius:99px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:16px;width:100%;transition:background .2s;}
.new-chat-btn:hover{background:rgba(0,0,0,.03);}
.shortcut-badge{font-size:11px;color:var(--text-dim);background:rgba(0,0,0,.04);padding:2px 6px;border-radius:4px;border:1px solid var(--border-color);font-family:monospace;}
.convo-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.convo-label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);padding:14px 8px 6px;font-weight:700;}
.convo-item{position:relative;padding:9px 12px;border-radius:8px;font-size:13.5px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .2s;}
.convo-item:hover{background:rgba(0,0,0,.03);color:var(--text-main);}
.convo-item.active{background:var(--bg-panel);color:var(--text-main);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.convo-title-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:22px;}
.delete-convo-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;display:none;padding:3px;border-radius:4px;}
.convo-item:hover .delete-convo-btn{display:flex;align-items:center;}
.delete-convo-btn:hover{color:#e55353;}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border-color);position:relative;}
.user-profile-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px;border-radius:12px;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .2s;}
.user-profile-btn:hover{background:rgba(0,0,0,.03);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:13px;font-weight:500;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.plan-badge{font-size:11px;color:var(--text-dim);}
.profile-menu{position:absolute;bottom:62px;left:0;right:0;background:var(--bg-panel);border:1px solid var(--border-color);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:none;flex-direction:column;z-index:100;overflow:hidden;}
.profile-menu.open{display:flex;}
.menu-item{padding:11px 14px;font-size:13.5px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:10px;background:none;border:none;text-align:left;width:100%;transition:background .2s;}
.menu-item:hover{background:rgba(0,0,0,.02);color:var(--text-main);}
.menu-divider{height:1px;background:var(--border-color);margin:4px 0;}
 
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;height:100dvh;background:var(--bg-main);align-items:center;}
.topbar{width:100%;flex-shrink:0;display:flex;align-items:center;padding:0 24px;min-height:54px;border-bottom:1px solid var(--border-color);}
.menu-toggle-btn{background:none;border:none;font-size:20px;color:var(--text-secondary);cursor:pointer;display:none;margin-right:12px;}
.topbar-title{font-size:14px;font-weight:500;color:var(--text-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chat-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;width:100%;-webkit-overflow-scrolling:touch;}
.chat-col{width:100%;max-width:780px;margin:auto;padding:24px 24px 0;display:flex;flex-direction:column;gap:0;flex:1;}
 
/* ── WELCOME ── */
.welcome-state{margin:auto;text-align:center;width:100%;padding:48px 0;display:flex;flex-direction:column;align-items:center;}
.welcome-title{font-family:'Source Serif 4',serif;font-size:34px;font-weight:400;margin-bottom:32px;letter-spacing:-.01em;}
.suggestion-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;width:100%;}
.suggestion-card{background:var(--bg-panel);border:1px solid var(--border-color);border-radius:12px;padding:16px;text-align:left;cursor:pointer;transition:background .2s,transform .1s;display:flex;flex-direction:column;gap:6px;min-height:100px;}
.suggestion-card:hover{background:var(--bg-main);border-color:var(--text-dim);transform:translateY(-1px);}
.suggestion-icon{font-size:16px;color:var(--accent);}
.suggestion-text{font-size:13.5px;font-weight:500;color:var(--text-main);}
.suggestion-sub{font-size:12px;color:var(--text-dim);line-height:1.4;}
 
/* ── MESSAGES ── */
.msg-container{display:flex;flex-direction:column;width:100%;padding:20px 0;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.msg-sender-label{font-size:11px;font-weight:600;color:var(--text-main);margin-bottom:8px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.06em;}
.msg-sender-label.user{justify-content:flex-end;color:var(--text-dim);}
.msg-row{display:flex;width:100%;}
.msg-row.user{justify-content:flex-end;}
.msg{width:100%;font-family:'Source Serif 4',Georgia,serif;font-size:16px;line-height:1.72;color:var(--text-main);word-wrap:break-word;}
.msg-row.user .msg{max-width:80%;font-family:'Inter',sans-serif;font-size:14.5px;background:var(--bubble-user);padding:11px 16px;border-radius:18px;line-height:1.55;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.msg h1,.msg h2,.msg h3{font-family:'Source Serif 4',serif;margin:1.1em 0 .45em;font-weight:600;line-height:1.3;}
.msg p{margin-bottom:.75em;}.msg p:last-child{margin-bottom:0;}
.msg ul,.msg ol{margin-bottom:.75em;padding-left:22px;}.msg li{margin-bottom:.25em;}
.msg table{display:block;border-collapse:collapse;width:100%;margin:1.2em 0;font-size:13.5px;overflow-x:auto;font-family:'Inter',sans-serif;}
.msg th,.msg td{border:1px solid var(--border-color);padding:9px 13px;text-align:left;}
.msg th{background:#f3f0e8;font-weight:600;}
.msg code{background:rgba(0,0,0,.04);padding:2px 5px;border-radius:4px;font-family:monospace;font-size:13px;color:#b84a25;}
.msg pre{background:#f8f6f0;border:1px solid var(--border-color);padding:14px;border-radius:8px;overflow-x:auto;margin:1.2em 0;font-family:monospace;}
.msg pre code{background:transparent;padding:0;color:#24292e;font-size:13px;}
.streaming-cursor::after{content:"▋";animation:blink .8s step-end infinite;color:var(--accent);margin-left:2px;}
@keyframes blink{50%{opacity:0}}
 
/* ── TOOL-USE BLOCKS (Claude-style) ── */
.tool-block{margin:.6em 0;border:1px solid var(--border-color);border-radius:10px;overflow:hidden;font-family:'Inter',sans-serif;}
.tool-header{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg-sidebar);cursor:pointer;user-select:none;font-size:13px;font-weight:500;color:var(--text-secondary);}
.tool-header:hover{background:#eae7df;}
.tool-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tool-status-dot.running{background:#f59e0b;animation:pulse 1s infinite;}
.tool-status-dot.done{background:#10b981;}
.tool-status-dot.error{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tool-chevron{margin-left:auto;transition:transform .2s;font-size:11px;color:var(--text-dim);}
.tool-chevron.open{transform:rotate(180deg);}
.tool-body{display:none;padding:12px 14px;font-size:12.5px;font-family:monospace;background:#fdfcf9;color:var(--text-secondary);white-space:pre-wrap;max-height:300px;overflow-y:auto;border-top:1px solid var(--border-color);}
.tool-body.open{display:block;}
.tool-label{font-size:11px;color:var(--text-dim);font-family:monospace;}
 
/* ── CODE BUTTONS ── */
.code-btn-row{display:flex;gap:6px;margin:4px 0 12px;flex-wrap:wrap;}
.code-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg-sidebar);border:1px solid var(--border-color);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:background .2s;}
.code-btn:hover{background:#e8e5dc;color:var(--text-main);}
 
/* ── GENERATED IMAGE ── */
.gen-img-loading{color:var(--text-dim);font-size:13px;font-style:italic;margin-top:10px;font-family:'Inter',sans-serif;}
.gen-img-result{max-width:100%;border-radius:12px;margin-top:12px;box-shadow:0 4px 16px rgba(0,0,0,.08);display:block;cursor:pointer;}
.gen-img-result:hover{opacity:.95;}
 
/* ── LONG TEXT DOWNLOAD ── */
.long-dl-link{display:flex;align-items:center;gap:8px;background:var(--bg-sidebar);border:1px solid var(--border-color);border-radius:10px;padding:11px 16px;margin-top:14px;font-size:13px;color:var(--text-secondary);text-decoration:none;max-width:400px;font-family:'Inter',sans-serif;}
.long-dl-link:hover{background:#e8e5dc;}
.long-dl-link u{color:var(--accent);}
 
/* ── THINKING STATE ── */
.thinking-state{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text-dim);font-family:'Inter',sans-serif;padding:4px 0;}
.dot-flashing{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:df 1s infinite linear alternate;position:relative;}
.dot-flashing::before,.dot-flashing::after{content:'';position:absolute;top:0;width:6px;height:6px;border-radius:50%;background:var(--accent);animation:df 1s infinite alternate;}
.dot-flashing::before{left:-12px;animation-delay:0s;}.dot-flashing::after{left:12px;animation-delay:.8s;}
@keyframes df{0%{background:var(--accent)}50%,100%{background:rgba(204,98,57,.15)}}
.loading-video-el{max-width:200px;border-radius:12px;display:block;}
 
/* ── ATTACHMENT CHIP ── */
.chip-bar{display:none;padding-bottom:10px;flex-wrap:wrap;gap:6px;}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-sidebar);border:1px solid var(--border-color);padding:5px 11px;border-radius:16px;font-size:12.5px;color:var(--text-secondary);font-family:'Inter',sans-serif;}
.file-chip img{width:32px;height:32px;object-fit:cover;border-radius:5px;}
.chip-remove{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:13px;border-radius:50%;padding:2px 4px;}
.chip-remove:hover{color:#e55353;}
 
/* ── COMPOSER ── */
.composer-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;width:100%;padding:0 24px 24px;background:linear-gradient(180deg,transparent 0%,var(--bg-main) 30%);z-index:30;}
.composer-box{width:100%;max-width:780px;border:1px solid var(--border-color);border-radius:16px;padding:14px 18px;position:relative;transition:border-color .2s,box-shadow .2s;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);box-shadow:0 2px 12px rgba(0,0,0,.03);}
.composer-box:focus-within{border-color:var(--text-dim);box-shadow:0 4px 20px rgba(0,0,0,.06);}
.composer-box textarea{width:100%;border:none;outline:none;resize:none;font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;max-height:200px;background:transparent;color:var(--text-main);padding-bottom:40px;}
.composer-box textarea::placeholder{color:var(--text-dim);}
.composer-bar{position:absolute;bottom:10px;left:18px;right:18px;display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
.composer-left{display:flex;align-items:center;gap:6px;pointer-events:auto;}
.composer-right{display:flex;align-items:center;gap:8px;pointer-events:auto;}
.pill-btn{background:var(--bg-sidebar);border:1px solid transparent;border-radius:20px;color:var(--text-secondary);font-size:12.5px;font-weight:500;padding:5px 13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s;font-family:'Inter',sans-serif;}
.pill-btn:hover{background:#e8e5dc;color:var(--text-main);}
.send-btn{background:var(--text-main);border:none;color:var(--bg-main);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;}
.send-btn:disabled{background:var(--border-color);color:var(--text-dim);cursor:not-allowed;}
.send-btn:not(:disabled):hover{background:var(--accent);color:#fff;transform:scale(1.05);}
 
/* ── PREVIEW PANEL (right side, Claude-style) ── */
.preview-panel{position:fixed;top:0;right:-720px;width:720px;max-width:92vw;height:100dvh;background:var(--bg-panel);border-left:1px solid var(--border-color);box-shadow:-6px 0 28px rgba(0,0,0,.05);z-index:200;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);}
.preview-panel.open{right:0;}
.preview-topbar{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border-color);font-size:13.5px;font-weight:500;flex-shrink:0;gap:8px;font-family:'Inter',sans-serif;}
.preview-topbar-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-main);}
.preview-topbar-actions{display:flex;gap:6px;}
.preview-act-btn{background:none;border:1px solid var(--border-color);border-radius:6px;padding:4px 10px;font-size:12.5px;cursor:pointer;color:var(--text-secondary);font-family:'Inter',sans-serif;}
.preview-act-btn:hover{background:var(--bg-sidebar);}
.preview-tabs{display:flex;border-bottom:1px solid var(--border-color);flex-shrink:0;}
.preview-tab{padding:9px 18px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;transition:color .2s;}
.preview-tab.active{color:var(--text-main);border-bottom-color:var(--text-main);font-weight:500;}
.preview-body{flex:1;overflow:hidden;position:relative;}
.preview-body iframe{width:100%;height:100%;border:none;}
.preview-body pre{padding:20px;overflow:auto;height:100%;font-size:12.5px;background:#f8f6f0;margin:0;font-family:monospace;line-height:1.6;}
.preview-body .preview-img-wrap{display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;}
.preview-body .preview-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;}
.preview-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.08);z-index:199;display:none;}
.preview-backdrop.active{display:block;}
 
/* ── TERMINAL (bottom, Claude Code-style) ── */
.terminal-wrap{position:fixed;bottom:0;left:260px;right:0;height:0;background:#1c1c1e;border-top:2px solid #333;z-index:150;display:flex;flex-direction:column;transition:height .25s cubic-bezier(.4,0,.2,1);overflow:hidden;}
.terminal-wrap.open{height:320px;}
.terminal-topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#111;color:#aaa;font-size:13px;border-bottom:1px solid #2a2a2a;flex-shrink:0;font-family:monospace;}
.terminal-topbar-left{display:flex;align-items:center;gap:8px;}
.terminal-dot{width:12px;height:12px;border-radius:50%;}
.terminal-output{flex:1;overflow-y:auto;padding:10px 16px;font-size:12.5px;font-family:'Courier New',monospace;line-height:1.6;white-space:pre-wrap;}
.t-out{color:#e0e0e0;}.t-err{color:#ff6b6b;}.t-ok{color:#50fa7b;}.t-cmd{color:#8be9fd;}
.terminal-input-row{display:flex;align-items:center;padding:8px 16px;border-top:1px solid #2a2a2a;flex-shrink:0;}
.terminal-prompt{color:#50fa7b;margin-right:8px;font-size:13px;font-family:monospace;}
.terminal-input{flex:1;background:transparent;border:none;outline:none;color:#f8f8f2;font-family:'Courier New',monospace;font-size:13px;}
.terminal-run-btn{background:#2d6a4f;border:none;color:#fff;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-family:monospace;}
 
/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal-overlay.open{display:flex;}
.modal-frame{background:var(--bg-panel);border:1px solid var(--border-color);width:100%;max-width:520px;border-radius:14px;box-shadow:0 16px 36px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;animation:mpop .15s ease-out;}
@keyframes mpop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
.modal-top{padding:16px 22px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;}
.modal-top h3{font-size:16px;font-weight:600;}
.modal-dismiss{background:none;border:none;font-size:20px;color:var(--text-dim);cursor:pointer;}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:18px;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.setting-info label{font-size:14px;font-weight:500;display:block;margin-bottom:2px;}
.setting-sub{font-size:12px;color:var(--text-dim);}
.danger-btn{background:#c94a4a;border:none;color:#fff;padding:9px 16px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;text-align:center;width:100%;}
.danger-btn:hover{background:#b03f3f;}
.backdrop-shield{position:fixed;inset:0;background:var(--overlay);z-index:35;display:none;opacity:0;transition:opacity .2s;}
.backdrop-shield.active{display:block;opacity:1;}
 
/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:8px 0 24px rgba(0,0,0,.04);}
  .menu-toggle-btn{display:block;}
  .composer-wrap{padding:0 16px 20px;}
  .chat-col{padding:16px 16px 0;}
  .terminal-wrap{left:0;}
}
@media(max-width:720px){
  .sidebar{width:270px;}
  .topbar{padding:0 14px;min-height:48px;}
  .preview-panel{width:100vw;right:-100vw;}
  .msg-row.user .msg{max-width:90%;}
  .msg{font-size:15.5px;}
  .welcome-title{font-size:26px;}
}
</style>
<link rel="icon" type="image/png" href="/icon-192.png">
</head>
<body>
 
<div class="backdrop-shield" id="sidebarBackdrop"></div>
 
<div class="sidebar" id="sidebar">
  <div class="brand-header">
    <img src="assets/logo.png" alt="P" class="brand-logo-img" onerror="this.style.display='none'">
    <span>Pratham AI</span>
  </div>
  <button class="new-chat-btn" id="newChatBtn">
    <span>New chat</span><span class="shortcut-badge">⌘K</span>
  </button>
  <div class="convo-list" id="convoList"></div>
  <div class="sidebar-footer">
    <div id="googleSignInContainer" style="display:none;padding:8px 0;"></div>
    <button class="user-profile-btn" id="profileToggleBtn" style="display:none;">
      <div class="user-avatar" id="userAvatarText">P</div>
      <div class="user-info">
        <div id="profileName" class="user-name">Guest</div>
        <div class="plan-badge">Free Plan</div>
      </div>
      <span style="font-size:11px;color:var(--text-dim);">▲</span>
    </button>
    <div class="profile-menu" id="profileMenu">
      <button class="menu-item" id="menuSettingsBtn">⚙️ Settings</button>
      <div class="menu-divider"></div>
      <button class="menu-item" id="menuLogoutBtn" style="color:var(--accent);">🚪 Log out</button>
    </div>
  </div>
</div>
 
<div class="main">
  <div class="topbar">
    <button class="menu-toggle-btn" id="menuBtn">☰</button>
    <span class="topbar-title" id="topbarTitle"></span>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const API = 'https://web-production-503208.up.railway.app';
let sessionToken = localStorage.getItem('pratham_token') || null;
let cachedUser   = JSON.parse(localStorage.getItem('pratham_user') || 'null');
let activeConvoId = localStorage.getItem('pratham_convo_id') ? parseInt(localStorage.getItem('pratham_convo_id')) : null;
let busy = false;
let pendingFile = null;
let pendingFileIsImage = false;
let currentPreviewBlob = null;
let currentPreviewFilename = 'file';

if (typeof marked !== 'undefined') {

// ═══════════════════════════════════════════════════════════════
// SIDEBAR TOGGLE
// ═══════════════════════════════════════════════════════════════
const sidebar  = document.getElementById('sidebar');
const backdrop = document.getElementById('sidebarBackdrop');
document.getElementById('menuBtn').addEventListener('click',e=>{e.stopPropagation();sidebar.classList.contains('open')?closeSidebar():openSidebar();});

function openSidebar(){sidebar.classList.add('open');backdrop.classList.add('active');}
 
const profileToggle = document.getElementById('profileToggleBtn');
const profileMenu   = document.getElementById('profileMenu');
profileToggle.addEventListener('click',e=>{e.stopPropagation();profileMenu.classList.toggle('open');});
document.addEventListener('click',e=>{if(!profileMenu.contains(e.target)&&e.target!==profileToggle)profileMenu.classList.remove('open');});

document.getElementById('menuSettingsBtn').addEventListener('click',()=>{profileMenu.classList.remove('open');settingsModal.classList.add('open');});
document.getElementById('closeSettings').addEventListener('click',()=>settingsModal.classList.remove('open'));

document.getElementById('clearChatsBtn').addEventListener('click',()=>{if(confirm('Delete ALL conversations?')){localStorage.removeItem('pratham_convo_id');activeConvoId=null;renderNewChat();settingsModal.classList.remove('open');}});

// ═══════════════════════════════════════════════════════════════
const msgInput = document.getElementById('msgInput');
const sendBtn  = document.getElementById('sendBtn');
msgInput.addEventListener('input',()=>{
  msgInput.style.height='auto';
  msgInput.style.height=Math.min(msgInput.scrollHeight,200)+'px';
  sendBtn.disabled=!msgInput.value.trim()&&!pendingFile;
});
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled&&!busy)handleSend();}});
window.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('newChatBtn').click();}});
function selectPrompt(v){if(busy)return;msgInput.value=v;msgInput.focus();msgInput.dispatchEvent(new Event('input'));}
 
// ═══════════════════════════════════════════════════════════════
// FILE ATTACHMENT
// ═══════════════════════════════════════════════════════════════
const fileInput = document.getElementById('fileInput');
document.getElementById('attachBtn').addEventListener('click',()=>fileInput.click());
 
fileInput.addEventListener('change',()=>{
  const f=fileInput.files[0]; if(!f) return;
  pendingFile=f; pendingFileIsImage=f.type.startsWith('image/');
  renderChip(); fileInput.value=''; sendBtn.disabled=false;
});
 
function renderChip(){
  const bar=document.getElementById('chipBar');
  if(!pendingFile){bar.innerHTML='';bar.style.display='none';return;}
  bar.style.display='flex';
  if(pendingFileIsImage){
    const r=new FileReader(); r.onload=e=>{
      bar.innerHTML=`<div class="file-chip"><img src="${e.target.result}"><span>${pendingFile.name}</span><button class="chip-remove" onclick="clearPending()">✕</button></div>`;
    }; r.readAsDataURL(pendingFile);
  } else {
    bar.innerHTML=`<div class="file-chip"><span>📎 ${pendingFile.name}</span><button class="chip-remove" onclick="clearPending()">✕</button></div>`;
  }
}
function clearPending(){pendingFile=null;pendingFileIsImage=false;renderChip();sendBtn.disabled=!msgInput.value.trim();}
 
function fileToBase64(f){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
}
 
async function uploadFile(conversationId){
  if(!pendingFile||!conversationId) return;
  if(pendingFileIsImage){
    try{
      const b64=await fileToBase64(pendingFile);
      const resp=await fetch(`${API}/analyze-image`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`},body:JSON.stringify({image_base64:b64,mime_type:pendingFile.type,conversation_id:conversationId})});
      const d=await resp.json();
      if(d.description) addMsg('model',`_📷 Image read: ${d.description.substring(0,200)}${d.description.length>200?'...':''}_`);
    }catch(e){console.error(e);}
  } else {
    const fd=new FormData(); fd.append('file',pendingFile); fd.append('conversation_id',String(conversationId));
    try{await fetch(`${API}/upload`,{method:'POST',headers:{Authorization:`Bearer ${sessionToken}`},body:fd});}catch(e){}
  }
  pendingFile=null; pendingFileIsImage=false; renderChip();
}
 
// ═══════════════════════════════════════════════════════════════
// AUTH — FIXED: wait for google to load instead of window.onload
// ═══════════════════════════════════════════════════════════════
function initWhenGoogleReady(){
  if(typeof google!=='undefined'&&google.accounts){
    google.accounts.id.initialize({
      client_id:'352716901368-sp0550kmd9jb9ob4b5adrq6npltq4jht.apps.googleusercontent.com',
      callback:handleGoogleCredential
    });
    if(sessionToken&&cachedUser) setupUI(cachedUser);
    else renderSignedOut();
  } else {
    setTimeout(initWhenGoogleReady,100);
  }
}
document.addEventListener('DOMContentLoaded',initWhenGoogleReady);
 
async function handleGoogleCredential(response){
  try{
    const res=await fetch(`${API}/auth/google`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id_token:response.credential})});
    if(!res.ok) throw new Error('Auth failed');
    const d=await res.json();
    sessionToken=d.session_token; cachedUser=d.user;
    localStorage.setItem('pratham_token',sessionToken);
    localStorage.setItem('pratham_user',JSON.stringify(cachedUser));
    setupUI(cachedUser);
  }catch(e){doSignOut();}
}
 
function setupUI(user){
  document.getElementById('googleSignInContainer').style.display='none';
  document.getElementById('profileToggleBtn').style.display='flex';
  document.getElementById('userAvatarText').textContent=(user.name||'P').charAt(0).toUpperCase();
  document.getElementById('profileName').textContent=user.name||'User';
  document.getElementById('settingsEmail').textContent=user.email||'Connected';
  if(activeConvoId) loadConvo(activeConvoId); else renderNewChat();
  syncConvos();
}
 
function doSignOut(){
  sessionToken=null; activeConvoId=null; cachedUser=null;
  ['pratham_token','pratham_user','pratham_convo_id'].forEach(k=>localStorage.removeItem(k));
  document.getElementById('profileToggleBtn').style.display='none';
  document.getElementById('convoList').innerHTML='';
  renderSignedOut();
}
 
function renderSignedOut(){
  document.getElementById('chatCol').innerHTML=`
    <div class="welcome-state">
      <h1 class="welcome-title">Welcome to Pratham AI</h1>
      <p style="color:var(--text-secondary);margin-bottom:24px;font-size:15px;">Sign in to sync your conversations.</p>
      <div id="gsiMain"></div>
    </div>`;
  if(typeof google!=='undefined'&&google.accounts){
    google.accounts.id.renderButton(document.getElementById('gsiMain'),{theme:'filled_blue',size:'large',text:'continue_with'});
    document.getElementById('googleSignInContainer').style.display='block';
    google.accounts.id.renderButton(document.getElementById('googleSignInContainer'),{theme:'outline',size:'medium'});
  }
  msgInput.disabled=true; msgInput.placeholder='Sign in to start chatting.';
  document.getElementById('topbarTitle').textContent='';
}
 
function renderNewChat(){
  document.getElementById('chatCol').innerHTML=`
    <div class="welcome-state">
      <h1 class="welcome-title">How can I help you today?</h1>
      <div class="suggestion-grid">
        <div class="suggestion-card" onclick="selectPrompt('Generate an image of a futuristic city at night')"><span class="suggestion-icon">🎨</span><span class="suggestion-text">Generate image</span><span class="suggestion-sub">Create AI art from your description</span></div>
        <div class="suggestion-card" onclick="selectPrompt('Write a Python script to analyze a CSV and plot a chart')"><span class="suggestion-icon">💻</span><span class="suggestion-text">Write code</span><span class="suggestion-sub">Build, debug, explain code</span></div>
        <div class="suggestion-card" onclick="selectPrompt('Summarize this article for me')"><span class="suggestion-icon">📝</span><span class="suggestion-text">Summarize</span><span class="suggestion-sub">Condense long text fast</span></div>
        <div class="suggestion-card" onclick="selectPrompt('Draft a professional email politely requesting a deadline extension')"><span class="suggestion-icon">✉️</span><span class="suggestion-text">Draft message</span><span class="suggestion-sub">Emails, letters, posts</span></div>

  msgInput.disabled=false; msgInput.placeholder='How can Pratham AI help you today?';

// ═══════════════════════════════════════════════════════════════
// CONVERSATIONS
// ═══════════════════════════════════════════════════════════════
async function syncConvos(){
  if(!sessionToken) return;
  try{
    const r=await fetch(`${API}/conversations`,{headers:{Authorization:`Bearer ${sessionToken}`}});
    if(r.status===401){doSignOut();return;}
    renderConvoList(await r.json());
  }catch(e){}
}
 
function renderConvoList(list){
  const el=document.getElementById('convoList'); el.innerHTML='';
  if(!list.length) return;
  const lbl=document.createElement('div'); lbl.className='convo-label'; lbl.textContent='Recent chats'; el.appendChild(lbl);
  list.forEach(c=>{
    const item=document.createElement('div'); item.className=`convo-item ${c.id===activeConvoId?'active':''}`;
    const txt=document.createElement('span'); txt.className='convo-title-text'; txt.textContent=c.title||'Chat'; item.appendChild(txt);
    const del=document.createElement('button'); del.className='delete-convo-btn'; del.innerHTML='✕';
    del.addEventListener('click',async e=>{e.stopPropagation();if(confirm('Delete?')){await fetch(`${API}/conversations/${c.id}`,{method:'DELETE',headers:{Authorization:`Bearer ${sessionToken}`}});if(activeConvoId===c.id){activeConvoId=null;localStorage.removeItem('pratham_convo_id');renderNewChat();}syncConvos();}});
    item.appendChild(del);
    txt.addEventListener('click',()=>{loadConvo(c.id);if(window.innerWidth<=1024)closeSidebar();});
    el.appendChild(item);
  });
}
 
document.getElementById('newChatBtn').addEventListener('click',()=>{
  activeConvoId=null; localStorage.removeItem('pratham_convo_id');
  pendingFile=null; renderChip(); renderNewChat(); syncConvos();
  if(window.innerWidth<=1024) closeSidebar();
});
 
async function loadConvo(id){
  activeConvoId=id; localStorage.setItem('pratham_convo_id',String(id));
  document.getElementById('chatCol').innerHTML='';
  try{
    const r=await fetch(`${API}/conversations/${id}/messages`,{headers:{Authorization:`Bearer ${sessionToken}`}});
    if(r.status===401){doSignOut();return;}
    const msgs=await r.json();
    msgs.forEach(m=>addMsg(m.role==='assistant'?'model':'user',m.content));
    syncConvos();
    setTimeout(()=>{document.getElementById('chatScroll').scrollTop=99999;},80);
    if(msgs.length) document.getElementById('topbarTitle').textContent=msgs[0]?.content?.substring(0,40)||'Chat';
  }catch(e){}
}
 
// ═══════════════════════════════════════════════════════════════
// PREVIEW PANEL
// ═══════════════════════════════════════════════════════════════
function openPreview(title, content, type){
  const panel=document.getElementById('previewPanel');
  const body=document.getElementById('previewBody');
  const tabs=document.getElementById('previewTabs');
  document.getElementById('previewTitle').textContent=title;
  currentPreviewFilename=title; body.innerHTML=''; tabs.innerHTML='';
 
  if(type==='html'){
    // Two tabs: Preview and Code
    ['Preview','Code'].forEach((t,i)=>{
      const tab=document.createElement('div'); tab.className='preview-tab'+(i===0?' active':'');
      tab.textContent=t; tab.addEventListener('click',()=>{
        tabs.querySelectorAll('.preview-tab').forEach(x=>x.classList.remove('active')); tab.classList.add('active');
        body.innerHTML='';
        if(t==='Preview'){const iframe=document.createElement('iframe');iframe.src=URL.createObjectURL(new Blob([content],{type:'text/html'}));iframe.sandbox='allow-scripts allow-same-origin';body.appendChild(iframe);}
        else{const pre=document.createElement('pre');pre.textContent=content;body.appendChild(pre);}
      }); tabs.appendChild(tab);
    });
    const iframe=document.createElement('iframe');
    iframe.src=URL.createObjectURL(new Blob([content],{type:'text/html'}));
    iframe.sandbox='allow-scripts allow-same-origin'; body.appendChild(iframe);
    currentPreviewBlob=new Blob([content],{type:'text/html'});
  } else if(type==='image'){
    const wrap=document.createElement('div'); wrap.className='preview-img-wrap';
    const img=document.createElement('img'); img.src=content; wrap.appendChild(img); body.appendChild(wrap);
    currentPreviewBlob=null;
  } else {
    const pre=document.createElement('pre'); pre.textContent=content; body.appendChild(pre);
    currentPreviewBlob=new Blob([content],{type:'text/plain'});
  }
 
  panel.classList.add('open'); document.getElementById('previewBackdrop').classList.add('active');
}
 
function closePreview(){
  document.getElementById('previewPanel').classList.remove('open');
  document.getElementById('previewBackdrop').classList.remove('active');
}
document.getElementById('previewCloseBtn').addEventListener('click',closePreview);
document.getElementById('previewBackdrop').addEventListener('click',closePreview);
document.getElementById('previewNewTabBtn').addEventListener('click',()=>{if(currentPreviewBlob)window.open(URL.createObjectURL(currentPreviewBlob),'_blank');});
document.getElementById('previewDlBtn').addEventListener('click',()=>{if(currentPreviewBlob){const a=document.createElement('a');a.href=URL.createObjectURL(currentPreviewBlob);a.download=currentPreviewFilename;a.click();}});
 
// ═══════════════════════════════════════════════════════════════
// TOOL BLOCK (Claude-style "Creating file..." steps)
// ═══════════════════════════════════════════════════════════════
function createToolBlock(label, detail){
  const wrap=document.createElement('div'); wrap.className='tool-block';
  const header=document.createElement('div'); header.className='tool-header';
  const dot=document.createElement('div'); dot.className='tool-status-dot running';
  const lbl=document.createElement('span'); lbl.textContent=label;
  const tlabel=document.createElement('span'); tlabel.className='tool-label'; tlabel.textContent=detail||'';
  const chev=document.createElement('span'); chev.className='tool-chevron'; chev.textContent='▾';
  header.appendChild(dot); header.appendChild(lbl); header.appendChild(tlabel); header.appendChild(chev);
  const body=document.createElement('div'); body.className='tool-body';
  if(detail) body.textContent=detail;
  header.addEventListener('click',()=>{body.classList.toggle('open');chev.classList.toggle('open');});
  wrap.appendChild(header); wrap.appendChild(body);
  return {wrap, dot, body, lbl};
}
 
function finishToolBlock(block, status='done', outputText=''){
  block.dot.className='tool-status-dot '+(status==='error'?'error':'done');
  if(outputText) block.body.textContent=outputText;
}
 
// ═══════════════════════════════════════════════════════════════
// CODE BUTTONS — adds View / Preview / Run under code blocks
// ═══════════════════════════════════════════════════════════════
function addCodeButtons(container){
  container.querySelectorAll('pre code').forEach(block=>{
    if(block.dataset.btnAdded) return;
    const code=block.textContent;
    const lang=(block.className.match(/language-(\w+)/)||['',''])[1];
    const isHtml=/<!DOCTYPE\s+html/i.test(code)||/<html[\s>]/i.test(code);
    const isPy=lang==='python'||lang==='py';
 
    const row=document.createElement('div'); row.className='code-btn-row';
 
    if(isHtml){
      const b=document.createElement('button'); b.className='code-btn'; b.textContent='▶ Preview';
      b.addEventListener('click',()=>openPreview('HTML Preview',code,'html')); row.appendChild(b);
    }
 
    const viewBtn=document.createElement('button'); viewBtn.className='code-btn'; viewBtn.textContent='📄 View';
    viewBtn.addEventListener('click',()=>openPreview(`${lang||'code'} file`,code,'code')); row.appendChild(viewBtn);
 
    const copyBtn=document.createElement('button'); copyBtn.className='code-btn'; copyBtn.textContent='⎘ Copy';
    copyBtn.addEventListener('click',()=>{navigator.clipboard.writeText(code);copyBtn.textContent='✓ Copied!';setTimeout(()=>copyBtn.textContent='⎘ Copy',1500);}); row.appendChild(copyBtn);
 
    if(isPy){
      const runBtn=document.createElement('button'); runBtn.className='code-btn'; runBtn.textContent='▶ Run';
      runBtn.addEventListener('click',()=>{openTerminal();runPyCode(code);}); row.appendChild(runBtn);
    }
 
    block.parentElement.insertAdjacentElement('afterend',row);
    block.dataset.btnAdded='1';
  });
}
 
function addLongDl(text, container){
  if(text.length<=5000) return;
  const blob=new Blob([text],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`pratham-ai-${Date.now()}.txt`; a.className='long-dl-link';
  a.innerHTML=`📄 <span>Long response (${text.length.toLocaleString()} chars) — <u>Download .txt</u></span>`;
  container.appendChild(a);
}
 
// ═══════════════════════════════════════════════════════════════
// IMAGE GENERATION (Puter.js → flux-schnell)
// ═══════════════════════════════════════════════════════════════
async function checkImageGen(text, parentEl){
  const m=text.match(/\[GENERATE_IMAGE:\s*([^\]]+)\]/);
  if(!m) return text;
  const prompt=m[1].trim();
  const cleaned=text.replace(/\[GENERATE_IMAGE:[^\]]+\]/,'').trim();
 
  const tb=createToolBlock('🎨 Generating image…',prompt.substring(0,60));
  parentEl.appendChild(tb.wrap);
 
  try{
    const img=await puter.ai.txt2img(prompt,{model:'black-forest-labs/flux-schnell'});
    img.className='gen-img-result'; img.alt=prompt;
    img.addEventListener('click',()=>openPreview('Generated Image',img.src,'image'));
    finishToolBlock(tb,'done','Image generated successfully');
    parentEl.appendChild(img);
    // Log to backend
    fetch(`${API}/log-image-prompt`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`},body:JSON.stringify({prompt})}).catch(()=>{});
  }catch(e){
    finishToolBlock(tb,'error','Image generation failed: '+e.message);
  }
  return cleaned;
}
 
// ═══════════════════════════════════════════════════════════════
// ADD MESSAGE
// ═══════════════════════════════════════════════════════════════
function addMsg(role, text){
  const welcome=document.getElementById('chatCol').querySelector('.welcome-state');
  if(welcome) welcome.remove();
 
  let clean=text;
  if(role==='model'){
    clean=text.replace(/\[STORE_MEMORY:[^\]]*\]/g,'').replace(/\[GENERATE_IMAGE:[^\]]*\]/g,'').trim();
    if(!clean&&!text.includes('[GENERATE_IMAGE:')) return null;
  }
 
  const container=document.createElement('div'); container.className='msg-container';
  const lbl=document.createElement('div'); lbl.className=`msg-sender-label${role==='user'?' user':''}`; lbl.textContent=role==='user'?'You':'Pratham AI';
  container.appendChild(lbl);
 
  const row=document.createElement('div'); row.className=`msg-row${role==='user'?' user':''}`;
  const bubble=document.createElement('div'); bubble.className='msg';
 
  if(role==='model'){
    row.appendChild(bubble); container.appendChild(row);
    document.getElementById('chatCol').appendChild(container);
    checkImageGen(text,bubble).then(t=>{
      if(t&&typeof marked!=='undefined') bubble.innerHTML=DOMPurify.sanitize(marked.parse(t));
      else if(t) bubble.textContent=t;
      addCodeButtons(bubble);
      addLongDl(t||'',container);
    });
  } else {
    bubble.textContent=clean; row.appendChild(bubble); container.appendChild(row);
    document.getElementById('chatCol').appendChild(container);
  }
  return bubble;
}
 
// ═══════════════════════════════════════════════════════════════
// THROTTLED RENDER (fixes lag on long responses)
// ═══════════════════════════════════════════════════════════════
let renderScheduled=false;
function scheduleRender(node, getFn){
  if(renderScheduled) return; renderScheduled=true;
  requestAnimationFrame(()=>{
    const s=getFn();
    node.innerHTML=typeof marked!=='undefined'?DOMPurify.sanitize(marked.parse(s)):s;
    renderScheduled=false;
  });
}
 
// ═══════════════════════════════════════════════════════════════
// SEND
// ═══════════════════════════════════════════════════════════════
async function handleSend(){
  const text=msgInput.value.trim();
  if((!text&&!pendingFile)||busy) return;
  busy=true; sendBtn.disabled=true;
  msgInput.value=''; msgInput.style.height='auto';
  addMsg('user',text||'(File attached)');
  document.getElementById('chatScroll').scrollTop=99999;
 
  // Upload file BEFORE sending if conversation exists (fixes attachment timing bug)
  const wasNew=!activeConvoId;
  if(pendingFile&&activeConvoId) await uploadFile(activeConvoId);
 
  // Create model response container
  const container=document.createElement('div'); container.className='msg-container';
  const lbl=document.createElement('div'); lbl.className='msg-sender-label'; lbl.textContent='Pratham AI';
  container.appendChild(lbl);
  container.innerHTML+=`<div class="msg-row"><div class="msg" id="tempBubble"></div></div>`;
  document.getElementById('chatCol').appendChild(container);
  document.getElementById('chatScroll').scrollTop=99999;
 
  const bubble=container.querySelector('#tempBubble');
 
  // Loading indicator (video → fallback dots)
  const vid=document.createElement('video'); vid.autoplay=true; vid.muted=true; vid.playsInline=true;
  vid.className='loading-video-el'; vid.src='assets/intro_anim.webm';
  vid.addEventListener('ended',()=>{if(vid.src.includes('intro_anim')){vid.src='assets/loop_anim.webm';vid.loop=true;vid.play().catch(()=>{});}});
  vid.addEventListener('error',()=>{vid.remove();const d=document.createElement('div');d.className='thinking-state';d.innerHTML='Thinking<div class="dot-flashing"></div>';d.id='thinkDots';bubble.appendChild(d);});
  bubble.appendChild(vid);
 
  function clearLoading(){const v=bubble.querySelector('.loading-video-el');if(v)v.remove();const d=document.getElementById('thinkDots');if(d)d.remove();}
 
  let accum='', buf='';
 
  try{
    const resp=await fetch(`${API}/chat-stream`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${sessionToken}`},body:JSON.stringify({message:text||'Process the attached file.',conversation_id:activeConvoId})});
    if(!resp.ok){if(resp.status===401)throw new Error('Session Expired');throw new Error('Server Error');}
 
    const reader=resp.body.getReader(); const dec=new TextDecoder(); let first=true;
 
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        const cl=line.trim(); if(!cl||!cl.startsWith('data:')) continue;
        let p; try{p=JSON.parse(cl.replace(/^data:\s*/,''));}catch(e){continue;}
 
        if(p.type==='metadata'){
          activeConvoId=parseInt(p.conversation_id);
          localStorage.setItem('pratham_convo_id',String(activeConvoId));
          syncConvos();
          if(pendingFile&&wasNew){await uploadFile(activeConvoId);}
        }
        else if(p.type==='token'){
          if(first){clearLoading();bubble.innerHTML='';bubble.classList.add('streaming-cursor');first=false;}
          accum+=p.text;
          const disp=accum.replace(/\[STORE_MEMORY:[^\]]*(\]|$)/g,'').replace(/\[GENERATE_IMAGE:[^\]]*(\]|$)/g,'');
          scheduleRender(bubble,()=>disp);
          document.getElementById('chatScroll').scrollTop=99999;
        }
        else if(p.type==='error'){throw new Error(p.text);}
      }
    }
 
    clearLoading(); bubble.classList.remove('streaming-cursor');
    let final=accum.replace(/\[STORE_MEMORY:[^\]]*\]/g,'').trim();
    if(final.includes('[GENERATE_IMAGE:')) final=await checkImageGen(accum,bubble);
    if(typeof marked!=='undefined') bubble.innerHTML=DOMPurify.sanitize(marked.parse(final));
    else bubble.textContent=final;
    addCodeButtons(bubble);
    addLongDl(final,container);
 
    // Update topbar title with first message snippet
    if(!document.getElementById('topbarTitle').textContent) document.getElementById('topbarTitle').textContent=(text||'Chat').substring(0,50);
 
  }catch(err){
    clearLoading(); bubble.classList.remove('streaming-cursor');
    bubble.innerHTML=`<span style="color:var(--accent);">⚠️ ${err.message}. Please try again.</span>`;
    if(err.message==='Session Expired') doSignOut();
  }
  busy=false; msgInput.focus();
}
sendBtn.addEventListener('click',handleSend);
 
// ═══════════════════════════════════════════════════════════════
// PYODIDE TERMINAL
// ═══════════════════════════════════════════════════════════════
function openTerminal(){
  const tw=document.getElementById('terminalWrap');
  tw.classList.add('open');
  if(!pyodide&&!pyodideLoading) loadPy();
}
 
async function loadPy(){
  pyodideLoading=true;
  termOut('Loading Python runtime…','t-ok');
  pyodide=await loadPyodide();
  pyodide.runPython(`
import sys,io
class _IO:
    def __init__(self): self.buf=""
    def write(self,t): self.buf+=t
    def flush(self): pass
sys.stdout=_IO(); sys.stderr=_IO()
  `);
  pyodideLoading=false;
  termOut('Python ready! Try: print("Hello World")','t-ok');
}
 
function termOut(text,cls='t-out'){
  const out=document.getElementById('termOutput');
  const line=document.createElement('div'); line.className=cls; line.textContent=text; out.appendChild(line); out.scrollTop=out.scrollHeight;
}
 
async function runPyCode(code){
  const py=pyodide;
  if(!py){termOut('Python still loading, please wait…','t-err');return;}
  termOut(code.split('\n')[0]+(code.includes('\n')?'\n...':''),'t-cmd');
  try{
    py.runPython("sys.stdout.buf='';sys.stderr.buf=''");
    await py.runPythonAsync(code);
    const out=py.runPython("sys.stdout.buf");
    if(out) termOut(out);
    const err=py.runPython("sys.stderr.buf");
    if(err) termOut(err,'t-err');
  }catch(e){termOut(e.message,'t-err');}
}
 
document.getElementById('terminalToggleBtn').addEventListener('click',()=>{
  const tw=document.getElementById('terminalWrap');
  tw.classList.toggle('open');
  if(tw.classList.contains('open')&&!pyodide&&!pyodideLoading) loadPy();
});
document.getElementById('closeTermBtn').addEventListener('click',()=>document.getElementById('terminalWrap').classList.remove('open'));
document.getElementById('clearTermBtn').addEventListener('click',()=>document.getElementById('termOutput').innerHTML='');
document.getElementById('termRunBtn').addEventListener('click',()=>{const v=document.getElementById('termInput').value.trim();if(v){runPyCode(v);document.getElementById('termInput').value='';}});
document.getElementById('termInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v){runPyCode(v);e.target.value='';}e.preventDefault();}});
</script>
