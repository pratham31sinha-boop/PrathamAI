<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Chess with Bot</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f0f0f0;
            touch-action: manipulation;
        }
        #board-container {
            max-width: 100%;
            margin: 0 auto;
            touch-action: none;
        }
        #board {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px auto;
            max-width: 500px;
        }
        button {
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:disabled {
            background-color: #cccccc;
        }
        .status {
            text-align: center;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }
        .difficulty {
            display: flex;
            justify-content: space-between;
            margin: 10px auto;
            max-width: 500px;
        }
        .difficulty label {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Mobile Chess</h1>
    <div class="status" id="status">Your turn (White)</div>
    <div id="board-container">
        <div id="board"></div>
    </div>
    <div class="controls">
        <button id="newGameBtn">New Game</button>
        <button id="undoBtn" disabled>Undo Move</button>
    </div>
    <div class="difficulty">
        <label><input type="radio" name="difficulty" value="easy" checked> Easy</label>
        <label><input type="radio" name="difficulty" value="medium"> Medium</label>
        <label><input type="radio" name="difficulty" value="hard"> Hard</label>
    </div>

    <script src="https://unpkg.com/chess.js@0.13.2/chess.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script>
        // Game state
        let game = new Chess();
        let board = null;
        let difficulty = 'easy';
        let undoStack = [];

        // Initialize the board
        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                orientation: 'white'
            };
            board = Chessboard('board', config);
        }

        // Board event handlers
        function onDragStart(source, piece, position, orientation) {
            // Do not pick up pieces if the game is over
            if (game.game_over()) return false;

            // Only pick up pieces for the side to move
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            // See if the move is legal
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Always promote to queen for simplicity
            });

            // Illegal move
            if (move === null) return 'snapback';

            // Save move to undo stack
            undoStack.push({
                fen: game.fen(),
                move: move
            });

            // Update status
            updateStatus();

            // Make the bot move after a short delay
            setTimeout(makeBotMove, 250);
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        // Bot move logic
        function makeBotMove() {
            if (game.game_over()) return;

            const possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            let move;

            // Different difficulty levels
            if (difficulty === 'easy') {
                // Random move
                move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            } else if (difficulty === 'medium') {
                // 50% chance of random move, 50% chance of "best" move
                if (Math.random() < 0.5) {
                    move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                } else {
                    // Try to find a capture or check
                    const captureMoves = possibleMoves.filter(m => m.includes('x'));
                    const checkMoves = possibleMoves.filter(m => m.includes('+'));

                    if (checkMoves.length > 0) {
                        move = checkMoves[Math.floor(Math.random() * checkMoves.length)];
                    } else if (captureMoves.length > 0) {
                        move = captureMoves[Math.floor(Math.random() * captureMoves.length)];
                    } else {
                        move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                    }
                }
            } else { // hard
                // Try to find the "best" move
                const captureMoves = possibleMoves.filter(m => m.includes('x'));
                const checkMoves = possibleMoves.filter(m => m.includes('+'));

                if (checkMoves.length > 0) {
                    move = checkMoves[Math.floor(Math.random() * checkMoves.length)];
                } else if (captureMoves.length > 0) {
                    move = captureMoves[Math.floor(Math.random() * captureMoves.length)];
                } else {
                    // Look for pawn moves or central control
                    const pawnMoves = possibleMoves.filter(m => m[0] === m[0].toLowerCase());
                    const centralMoves = possibleMoves.filter(m =>
                        (m.includes('e4') || m.includes('e5') || m.includes('d4') || m.includes('d5')) &&
                        !m.includes('x')
                    );

                    if (centralMoves.length > 0) {
                        move = centralMoves[Math.floor(Math.random() * centralMoves.length)];
                    } else if (pawnMoves.length > 0) {
                        move = pawnMoves[Math.floor(Math.random() * pawnMoves.length)];
                    } else {
                        move = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                    }
                }
            }

            // Make the move
            game.move(move);

            // Save move to undo stack
            undoStack.push({
                fen: game.fen(),
                move: game.history({ verbose: true }).pop()
            });

            // Update board and status
            board.position(game.fen());
            updateStatus();
        }

        // Update game status
        function updateStatus() {
            const statusEl = document.getElementById('status');
            let status = '';

            if (game.in_checkmate()) {
                status = 'Game over, ' + (game.turn() === 'w' ? 'Black' : 'White') + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = (game.turn() === 'w' ? 'Your turn (White)' : 'Bot is thinking...');

                if (game.in_check()) {
                    status += ', ' + (game.turn() === 'w' ? 'White' : 'Black') + ' is in check';
                }
            }

            statusEl.textContent = status;

            // Enable/disable undo button
            document.getElementById('undoBtn').disabled = undoStack.length === 0;
        }

        // New game
        function newGame() {
            game.reset();
            board.start();
            undoStack = [];
            updateStatus();
        }

        // Undo move
        function undoMove() {
            if (undoStack.length >= 2) {
                // Pop the last two moves (player and bot)
                undoStack.pop();
                const prevState = undoStack.pop();

                game.load(prevState.fen);
                board.position(prevState.fen);
                updateStatus();
            } else if (undoStack.length === 1) {
                // Only one move to undo (player's move before bot moved)
                const prevState = undoStack.pop();
                game.load(prevState.fen);
                board.position(prevState.fen);
                updateStatus();
            }
        }

        // Event listeners
        document.getElementById('newGameBtn').addEventListener('click', newGame);
        document.getElementById('undoBtn').addEventListener('click', undoMove);

        // Difficulty change
        document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
            radio.addEventListener('change', function() {
                difficulty = this.value;
            });
        });

        // Initialize the game
        initBoard();
        updateStatus();
    </script>
</body>
</html>
