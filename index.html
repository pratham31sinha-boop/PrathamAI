<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pratham AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>

    <style>
        /* Core Reset & Variables */
        :root {
            --bg: #ffffff;
            --bg-sidebar: #f7f7f8;
            --border: #e5e5e5;
            --text-main: #000000;
            --text-muted: #666666;
            --accent: #10a37f;
            --bubble-user: #f3f4f6;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Source Serif 4', serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--text-main); display: flex; height: 100dvh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; flex-shrink: 0; }
        .new-chat { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; transition: background 0.2s; }
        .new-chat:hover { background: #e5e5e5; }
        .history { flex: 1; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column; gap: 4px; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #e5e5e5; color: var(--text-main); }
        .auth-container { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
        .btn-logout { width: 100%; padding: 10px; background: #ff4a4a; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; }

        /* Main Workspace */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-viewport { flex: 1; overflow-y: auto; padding: 20px 0 100px; display: flex; flex-direction: column; align-items: center; }
        .message-row { width: 100%; max-width: 800px; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); }
        .msg-content { font-family: var(--font-serif); font-size: 16px; line-height: 1.6; word-wrap: break-word; }
        
        /* Message Types */
        .message-row.user { align-items: flex-end; }
        .message-row.user .msg-content { background: var(--bubble-user); padding: 12px 16px; border-radius: 16px; font-family: var(--font-sans); }
        
        /* Markdown formatting */
        .msg-content pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow-x: auto; font-family: monospace; font-size: 14px; margin: 12px 0; }
        .msg-content code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; }
        .msg-content pre code { background: transparent; padding: 0; }
        
        /* Input Dock */
        .input-dock { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, var(--bg) 20%); display: flex; justify-content: center; }
        .input-box { width: 100%; max-width: 800px; background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); display: flex; align-items: flex-end; padding: 12px 16px; }
        .input-box textarea { flex: 1; border: none; outline: none; resize: none; max-height: 200px; font-family: var(--font-sans); font-size: 16px; padding: 8px 0; }
        .btn-send { background: var(--text-main); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; margin-bottom: 4px; }
        .btn-send:disabled { background: var(--border); cursor: not-allowed; }
        .btn-send:not(:disabled):hover { transform: scale(1.1); }

        /* Welcome Zero-state */
        .hero { text-align: center; margin-top: 10vh; }
        .hero h1 { font-family: var(--font-serif); font-size: 32px; font-weight: 400; margin-bottom: 12px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <button class="new-chat" onclick="startNewChat()">New chat <span>+</span></button>
        <div class="history" id="chatHistory"></div>
        
        <div class="auth-container">
            <div id="gsiMain"></div>
            <button class="btn-logout" id="btnLogout" onclick="signOut()">Log Out</button>
        </div>
    </aside>

    <main class="main">
        <div class="chat-viewport" id="chatViewport">
            <div class="hero" id="heroState">
                <h1>Pratham AI</h1>
                <p style="color:var(--text-muted);">How can I assist you today?</p>
            </div>
        </div>

        <div class="input-dock">
            <div class="input-box">
                <textarea id="msgInput" rows="1" placeholder="Message Pratham AI..."></textarea>
                <button class="btn-send" id="btnSend" disabled>↑</button>
            </div>
        </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        const API_URL = "https://web-production-503208.up.railway.app";
        let sessionToken = localStorage.getItem('pratham_token');
        let activeConvId = null;
        let isGenerating = false;
        
        // Background Python Engine State
        let pyodideInstance = null;

        const DOM = {
            viewport: document.getElementById('chatViewport'),
            input: document.getElementById('msgInput'),
            send: document.getElementById('btnSend'),
            hero: document.getElementById('heroState'),
            history: document.getElementById('chatHistory'),
            btnLogout: document.getElementById('btnLogout')
        };

        // --- 1. Initialization & Auth ---
        window.onload = () => {
            initPyodideBackground();
            marked.setOptions({ highlight: (code, lang) => hljs.highlightAuto(code).value });
            
            if(sessionToken) {
                DOM.btnLogout.style.display = 'block';
                loadHistory();
            } else {
                google.accounts.id.initialize({
                    client_id: '352716901368-sp0550kmd9jb9ob4b5adrq6npltq4jht.apps.googleusercontent.com',
                    callback: handleGoogleLogin
                });
                google.accounts.id.renderButton(document.getElementById('gsiMain'), { theme: 'outline', size: 'large' });
            }
        };

        async function handleGoogleLogin(response) {
            try {
                const res = await fetch(`${API_URL}/auth/google`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id_token: response.credential})
                });
                const data = await res.json();
                if(data.session_token) {
                    sessionToken = data.session_token;
                    localStorage.setItem('pratham_token', sessionToken);
                    document.getElementById('gsiMain').style.display = 'none';
                    DOM.btnLogout.style.display = 'block';
                    loadHistory();
                }
            } catch (err) { console.error("Login failed", err); }
        }

        function signOut() {
            localStorage.removeItem('pratham_token');
            location.reload();
        }

        // --- 2. Hidden Python Engine ---
        async function initPyodideBackground() {
            try {
                pyodideInstance = await loadPyodide();
                console.log("[System] Background Pyodide Ready.");
            } catch (err) { console.error("Pyodide failed to load silently."); }
        }

        async function executeHiddenPython(code) {
            if(!pyodideInstance) return;
            try {
                // Run completely invisibly in background
                await pyodideInstance.runPythonAsync(code);
                console.log("[System] Executed AI background task.");
            } catch(e) { console.error("Background task failed:", e); }
        }

        // --- 3. UI Interactions ---
        DOM.input.addEventListener('input', () => {
            DOM.input.style.height = 'auto';
            DOM.input.style.height = Math.min(DOM.input.scrollHeight, 200) + 'px';
            DOM.send.disabled = !DOM.input.value.trim() || isGenerating;
        });

        DOM.input.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if(!DOM.send.disabled) sendMessage();
            }
        });
        DOM.send.addEventListener('click', sendMessage);

        function startNewChat() {
            activeConvId = null;
            DOM.viewport.innerHTML = '';
            DOM.viewport.appendChild(DOM.hero);
        }

        // --- 4. Core Messaging ---
        async function sendMessage() {
            const text = DOM.input.value.trim();
            if(!text || isGenerating || !sessionToken) return;

            isGenerating = true;
            DOM.send.disabled = true;
            DOM.input.value = '';
            DOM.input.style.height = 'auto';
            
            if(DOM.hero) DOM.hero.remove();

            // Append User Message
            appendMessage('user', text);

            // Setup AI Bubble
            const aiBubble = appendMessage('model', '');
            aiBubble.innerHTML = '<i>Thinking...</i>';

            try {
                const response = await fetch(`${API_URL}/chat-stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ message: text, conversation_id: activeConvId })
                });

                if(response.status === 401) { signOut(); return; }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiBubble.innerHTML = '';
                let fullResponse = "";

                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    
                    const chunks = decoder.decode(value).split('\n');
                    for(const chunk of chunks) {
                        if(chunk.startsWith('data: ')) {
                            const data = JSON.parse(chunk.substring(6));
                            
                            if(data.type === 'metadata') {
                                activeConvId = data.conversation_id;
                                loadHistory();
                            } else if(data.type === 'token') {
                                fullResponse += data.text;
                                
                                // Regex to find and remove [EXECUTE_PYTHON: ...] blocks from the UI
                                let displayHtml = fullResponse;
                                const pythonBlockRegex = /\[EXECUTE_PYTHON:([\s\S]*?)\]/g;
                                
                                let match;
                                while ((match = pythonBlockRegex.exec(fullResponse)) !== null) {
                                    // Found a block, run it in background
                                    executeHiddenPython(match[1]);
                                }
                                
                                // Clean the string so the user never sees the command tags
                                displayHtml = displayHtml.replace(pythonBlockRegex, '');
                                
                                aiBubble.innerHTML = DOMPurify.sanitize(marked.parse(displayHtml));
                                window.scrollTo(0, document.body.scrollHeight);
                            }
                        }
                    }
                }
            } catch(e) {
                aiBubble.innerHTML = '<span style="color:red">Network Error. Please try again.</span>';
            } finally {
                isGenerating = false;
                DOM.send.disabled = !DOM.input.value.trim();
                DOM.input.focus();
            }
        }

        function appendMessage(role, text) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = role === 'user' ? 'You' : 'Pratham AI';
            
            const content = document.createElement('div');
            content.className = 'msg-content';
            content.textContent = text;
            
            row.appendChild(label);
            row.appendChild(content);
            DOM.viewport.appendChild(row);
            window.scrollTo(0, document.body.scrollHeight);
            
            return content; // Return to allow streaming updates
        }

        async function loadHistory() {
            try {
                const res = await fetch(`${API_URL}/conversations`, { headers: {'Authorization': `Bearer ${sessionToken}`} });
                const convos = await res.json();
                DOM.history.innerHTML = '';
                convos.forEach(c => {
                    const d = document.createElement('div');
                    d.className = 'history-item';
                    d.textContent = c.title || 'Conversation';
                    d.onclick = () => loadMessages(c.id);
                    DOM.history.appendChild(d);
                });
            } catch(e) {}
        }

        async function loadMessages(id) {
            activeConvId = id;
            DOM.viewport.innerHTML = '';
            try {
                const res = await fetch(`${API_URL}/conversations/${id}/messages`, { headers: {'Authorization': `Bearer ${sessionToken}`} });
                const msgs = await res.json();
                msgs.forEach(m => {
                    const bubble = appendMessage(m.role === 'assistant' ? 'model' : 'user', '');
                    bubble.innerHTML = DOMPurify.sanitize(marked.parse(m.content));
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
