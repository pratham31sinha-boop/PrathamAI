<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — Pratham AI</title>
<style>
  :root {
    --bg: #faf9f5;
    --text: #30302e;
    --text-dim: #83827d;
    --accent: #c2613f;
    --border: #e5e2d9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #262624;
      --text: #f5f4ef;
      --text-dim: #a6a49c;
      --accent: #d97757;
      --border: #3d3c39;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 8px; }
  p { font-size: 13.5px; color: var(--text-dim); margin: 0 0 22px; line-height: 1.5; }
  a.manual {
    display: inline-block;
    padding: 11px 22px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }
  .hidden { display: none; }
</style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <h1>Signing you in…</h1>
    <p>Returning to the Pratham AI app.</p>
    <a id="manualLink" class="manual hidden" href="#">Open the app</a>
  </div>

  <script>
    // Google redirects here with the id_token (and other params) either in
    // the URL fragment (#...) or query string (?...), depending on the
    // response_type the app requested. We forward whichever we get,
    // unchanged, to the app's custom scheme.
    //
    // This page's own URL is what's registered in Google Cloud Console as
    // the "Authorized redirect URI" — it's a normal HTTPS URL with a real
    // domain, so Google accepts it without complaint. The hop to the
    // app-only custom scheme happens here, client-side, after Google is
    // already out of the picture.

    var APP_SCHEME = 'prathamai://auth-callback';

    var forwardedParams = window.location.hash
      ? window.location.hash.substring(1)
      : window.location.search.substring(1);

    var appUrl = APP_SCHEME + (forwardedParams ? '#' + forwardedParams : '');

    var manualLink = document.getElementById('manualLink');
    manualLink.href = appUrl;

    // Try to hand off automatically first.
    window.location.replace(appUrl);

    // Some in-app/Custom Tabs browsers block an automatic scheme redirect
    // without a user gesture — show a manual fallback button after a beat
    // in case the automatic one didn't fire.
    setTimeout(function () {
      manualLink.classList.remove('hidden');
    }, 1200);
  </script>
</body>
</html>
